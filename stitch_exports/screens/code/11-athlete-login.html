<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NutriStats | Athlete Authorization</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@300;400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "inverse-primary": "#b12f00",
                "tertiary": "#c2ff99",
                "outline-variant": "#484847",
                "on-secondary-container": "#e8fbff",
                "primary-fixed-dim": "#ff5d2b",
                "on-tertiary-fixed-variant": "#2b6600",
                "surface": "#0e0e0e",
                "secondary": "#00e3fd",
                "surface-variant": "#262626",
                "error": "#ff716c",
                "background": "#0e0e0e",
                "primary-container": "#ff7851",
                "tertiary-container": "#75fd00",
                "on-primary-fixed-variant": "#581300",
                "error-container": "#9f0519",
                "primary": "#ff8f6f",
                "on-secondary-fixed-variant": "#005964",
                "on-error-container": "#ffa8a3",
                "secondary-dim": "#00d4ec",
                "surface-container-lowest": "#000000",
                "secondary-container": "#006875",
                "on-primary-container": "#470e00",
                "tertiary-fixed": "#75fd00",
                "surface-bright": "#2c2c2c",
                "surface-dim": "#0e0e0e",
                "on-secondary-fixed": "#003a42",
                "error-dim": "#d7383b",
                "on-surface-variant": "#adaaaa",
                "secondary-fixed-dim": "#00d7f0",
                "on-surface": "#ffffff",
                "outline": "#767575",
                "primary-dim": "#ff734a",
                "tertiary-dim": "#6ded00",
                "on-tertiary": "#2b6500",
                "inverse-surface": "#fcf9f8",
                "on-tertiary-fixed": "#1c4700",
                "on-error": "#490006",
                "surface-container-high": "#20201f",
                "secondary-fixed": "#26e6ff",
                "on-secondary": "#004d57",
                "on-background": "#ffffff",
                "inverse-on-surface": "#565555",
                "surface-tint": "#ff8f6f",
                "primary-fixed": "#ff7851",
                "tertiary-fixed-dim": "#6ded00",
                "on-tertiary-container": "#265c00",
                "surface-container-highest": "#262626",
                "surface-container-low": "#131313",
                "on-primary": "#5c1400",
                "surface-container": "#1a1a1a",
                "on-primary-fixed": "#000000"
              },
              fontFamily: {
                "headline": ["Space Grotesk"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .data-gradient {
            background: linear-gradient(180deg, rgba(14, 14, 14, 0) 0%, rgba(255, 143, 111, 0.05) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-secondary selection:text-on-secondary-fixed">
<main class="relative min-h-screen w-full flex flex-col items-center justify-center px-6 overflow-hidden">
<!-- Background Architectural Elements -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/5 blur-[100px]"></div>
<!-- Grid Pattern Overlay -->
<div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(circle, #ffffff 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
<!-- Brand Header (Suppressed Navigation as per Protocol) -->
<div class="z-10 mb-16 text-center">
<h1 class="font-headline font-black text-4xl md:text-5xl tracking-[0.2em] text-primary uppercase mb-2">
                IRON &amp; LOGIC
            </h1>
<div class="flex items-center justify-center gap-2">
<span class="h-[1px] w-8 bg-outline-variant/30"></span>
<p class="font-headline text-[10px] tracking-[0.4em] text-on-surface-variant uppercase">Performance Lab v4.0</p>
<span class="h-[1px] w-8 bg-outline-variant/30"></span>
</div>
</div>
<!-- Auth Canvas -->
<div class="z-10 w-full max-w-md">
<div class="bg-surface-container-low border border-outline-variant/10 p-8 md:p-10 shadow-[0_0_50px_rgba(0,0,0,0.5)] relative">
<!-- Corner Accents for "Instrument" feel -->
<div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-primary/20"></div>
<div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-secondary/20"></div>
<div class="mb-10">
<h2 class="font-headline text-2xl font-bold tracking-tight text-on-surface mb-1">SYSTEM_AUTH</h2>
<p class="text-on-surface-variant text-sm font-medium">ESTABLISH SECURE LINK TO KINETIC DATA</p>
</div>
<form class="space-y-8">
<!-- Athlete Email Field -->
<div class="group">
<label class="block font-headline text-[10px] tracking-widest text-on-surface-variant uppercase mb-2 group-focus-within:text-secondary transition-colors">
                            ATHLETE EMAIL
                        </label>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant/30 py-3 text-lg font-headline tracking-wide focus:outline-none focus:border-secondary transition-all placeholder:text-on-surface-variant/20" placeholder="athlete@performance.io" type="email"/>
</div>
</div>
<!-- Access Key Field -->
<div class="group">
<label class="block font-headline text-[10px] tracking-widest text-on-surface-variant uppercase mb-2 group-focus-within:text-secondary transition-colors">
                            ACCESS KEY
                        </label>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline-variant/30 py-3 text-lg font-headline tracking-widest focus:outline-none focus:border-secondary transition-all placeholder:text-on-surface-variant/20" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary-fixed font-headline font-bold text-sm tracking-[0.2em] py-5 rounded-sm hover:brightness-110 active:scale-[0.98] transition-all uppercase shadow-[0_4px_20px_rgba(255,143,111,0.2)]" type="submit">
                            AUTHORIZE ACCESS
                        </button>
</div>
</form>
<!-- Alternative Actions -->
<div class="mt-12 space-y-4">
<button class="w-full flex items-center justify-between group py-3 px-4 border border-outline-variant/15 hover:border-secondary/30 transition-all">
<span class="font-headline text-[10px] tracking-widest text-on-surface-variant group-hover:text-secondary uppercase">DEMO ACCESS</span>
<span class="material-symbols-outlined text-secondary text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<div class="flex justify-center pt-4">
<a class="font-headline text-[10px] tracking-[0.15em] text-on-surface-variant hover:text-primary transition-colors uppercase flex items-center gap-2" href="#">
                            NEW ATHLETE REGISTRATION
                            <span class="material-symbols-outlined text-[12px]">open_in_new</span>
</a>
</div>
</div>
</div>
<!-- Security Clearance Indicator -->
<div class="mt-8 flex items-center justify-between px-2">
<div class="flex gap-1">
<div class="w-1 h-3 bg-tertiary/20"></div>
<div class="w-1 h-3 bg-tertiary/20"></div>
<div class="w-1 h-3 bg-tertiary/20"></div>
<div class="w-1 h-3 bg-outline-variant/20"></div>
</div>
<p class="font-headline text-[9px] tracking-widest text-outline-variant uppercase">AES-256 KINETIC ENCRYPTION ACTIVE</p>
</div>
</div>
<!-- Bottom Detail -->
<div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-8 opacity-40">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-lg mb-1">bolt</span>
<span class="font-headline text-[8px] tracking-tighter">HYPER_SYNC</span>
</div>
<div class="h-8 w-[1px] bg-outline-variant"></div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-lg mb-1">monitoring</span>
<span class="font-headline text-[8px] tracking-tighter">DATA_FORGE</span>
</div>
<div class="h-8 w-[1px] bg-outline-variant"></div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-lg mb-1">shield</span>
<span class="font-headline text-[8px] tracking-tighter">CORE_GUARD</span>
</div>
</div>
</main>
<!-- Structural Element: Performance Data Strip -->
<div class="fixed top-0 left-0 w-1 h-screen bg-primary/20 z-50"></div>
<div class="fixed top-0 right-0 w-1 h-screen bg-secondary/20 z-50"></div>
</body></html>
