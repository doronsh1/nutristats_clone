<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary-fixed overflow-hidden">
<!-- Auth Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center p-6 textured-bg" data-alt="Dark dramatic gym interior with soft lighting shadows">
<!-- Branding Anchor -->
<header class="absolute top-12 left-0 w-full px-8 flex justify-between items-end">
<div class="flex flex-col">
<span class="text-xs font-label font-bold tracking-[0.3em] text-on-surface-variant uppercase">Performance Lab</span>
<h1 class="font-headline font-black text-2xl tracking-widest text-primary uppercase">KINETIC LAB</h1>
</div>
<div class="h-[2px] w-12 bg-secondary opacity-50 mb-2"></div>
</header>
<!-- Centered Login Card -->
<div class="w-full max-w-md space-y-12 z-10">
<!-- Hero Statement -->
<div class="space-y-4">
<h2 class="font-headline font-bold text-5xl md:text-6xl tracking-tighter leading-[0.9] text-on-surface uppercase">
                    COMMAND <br/>
<span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-container">YOUR PERFORMANCE.</span>
</h2>
<p class="text-on-surface-variant font-body text-sm max-w-[280px] leading-relaxed">
                    Access the elite-grade nutrition engine designed for the high-precision athlete.
                </p>
</div>
<!-- Form Section -->
<div class="space-y-8">
<div class="space-y-6">
<!-- Email Input -->
<div class="relative group">
<label class="block font-label text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-1">Deployment Email</label>
<input class="w-full bg-transparent border-b border-outline-variant focus:border-secondary focus:ring-0 text-on-surface font-headline placeholder:text-surface-bright transition-all py-3 px-0 uppercase text-lg tracking-wider" placeholder="ATHLETE@KINETIC.LAB" type="email"/>
<div class="absolute bottom-0 left-0 w-0 h-[1px] bg-secondary group-focus-within:w-full transition-all duration-500"></div>
</div>
<!-- Password Input -->
<div class="relative group">
<label class="block font-label text-[10px] font-bold tracking-widest text-on-surface-variant uppercase mb-1">Access Protocol</label>
<input class="w-full bg-transparent border-b border-outline-variant focus:border-secondary focus:ring-0 text-on-surface font-headline placeholder:text-surface-bright transition-all py-3 px-0 text-lg tracking-widest" placeholder="••••••••" type="password"/>
<div class="absolute bottom-0 left-0 w-0 h-[1px] bg-secondary group-focus-within:w-full transition-all duration-500"></div>
<button class="absolute right-0 bottom-4 text-on-surface-variant hover:text-secondary">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-4">
<button class="w-full py-5 bg-primary text-on-primary-fixed font-headline font-black text-sm tracking-[0.2em] uppercase rounded-sm hover:bg-primary-container transition-colors active:scale-[0.98]">
                        Login to Terminal
                    </button>
<button class="w-full py-5 border border-outline-variant/30 text-on-surface font-headline font-bold text-sm tracking-[0.2em] uppercase rounded-sm hover:bg-surface-container transition-colors active:scale-[0.98]">
                        Start Your Transformation
                    </button>
</div>
</div>

<div class="flex items-center justify-between pt-8">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary"></span>
<span class="font-label text-[9px] font-bold text-on-surface-variant tracking-widest uppercase">System Secure</span>
</div>

</div>
